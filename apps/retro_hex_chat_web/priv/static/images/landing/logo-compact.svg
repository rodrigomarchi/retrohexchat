<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b3b3"/>
      <stop offset="100%" stop-color="#008080"/>
    </linearGradient>
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006666"/>
      <stop offset="100%" stop-color="#004d4d"/>
    </linearGradient>
    <linearGradient id="fr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#009999"/>
      <stop offset="100%" stop-color="#007a7a"/>
    </linearGradient>
    <linearGradient id="fb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#005c5c"/>
      <stop offset="100%" stop-color="#003d3d"/>
    </linearGradient>
  </defs>

  <!-- Hex gem (simplified for small sizes) -->
  <polygon points="32,6 53,18 53,42 32,54 11,42 11,18" fill="#003d3d"/>
  <polygon points="32,6 53,18 32,24 11,18" fill="url(#ft)"/>
  <polygon points="11,18 32,24 32,42 11,42" fill="url(#fl)"/>
  <polygon points="53,18 32,24 32,42 53,42" fill="url(#fr)"/>
  <polygon points="32,42 11,42 32,54 53,42" fill="url(#fb)"/>

  <!-- Simplified chat bubble -->
  <rect x="20" y="22" width="24" height="16" rx="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <polygon points="24,38 28,38 22,44" fill="#c0c0c0"/>
  <!-- Text lines -->
  <line x1="24" y1="27" x2="40" y2="27" stroke="#000080" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="36" y2="32" stroke="#008080" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparkle -->
  <rect x="46" y="12" width="2" height="2" fill="#fff" opacity="0.8"/>
</svg>
