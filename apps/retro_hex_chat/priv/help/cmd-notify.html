<h3>/notify</h3><p>Manage your notify (buddy) list to track when users come online or go offline.</p><h4>Syntax</h4><pre>/notify add &lt;nickname&gt; [note]
/notify remove &lt;nickname&gt;
/notify edit &lt;nickname&gt; &lt;note&gt;
/notify list
/notify</pre><h4>Examples</h4><pre>/notify add Alice My friend
/notify remove Bob
/notify list</pre><h4>See Also</h4><p><a href="#" data-help-topic="feature-notify-list">Notify List</a></p>
