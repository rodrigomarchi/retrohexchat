<h3>Character Counter</h3><p>A real-time character counter appears near the input box showing <code>current/maximum</code> (e.g., <code>127/1000</code>).</p><h4>Color Indicators</h4><p>The counter changes color as you approach the limit:<br/><strong>Green</strong> — under 80% used<br/><strong>Orange</strong> — 80-95% used<br/><strong>Red</strong> — over 95% used</p>
