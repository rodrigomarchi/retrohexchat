<h3>+K No Knock</h3><p>Disables the /knock command for the channel. Users will not be able to send knock requests to the channel while this mode is active.</p><h4>Usage</h4><pre>/mode +K    — Disable knocking
/mode -K    — Allow knocking</pre><h4>See Also</h4><p><a href="#" data-help-topic="cmd-knock">/knock Command</a> · <a href="#" data-help-topic="mode-i">Invite Only (+i)</a></p>
