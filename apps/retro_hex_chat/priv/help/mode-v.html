<h3>+v Voice</h3><p>Grants voice to a user (prefix +), allowing them to speak in moderated (+m) channels. Half-operators and above can grant voice.</p><h4>Usage</h4><pre>/mode +v Alice    — Give voice to Alice
/mode -v Alice    — Remove voice from Alice</pre><h4>See Also</h4><p><a href="#" data-help-topic="mode-m">Moderated (+m)</a> · <a href="#" data-help-topic="mode-h">Half-Operator (+h)</a></p>
