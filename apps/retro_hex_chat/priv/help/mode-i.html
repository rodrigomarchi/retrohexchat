<h3>+i Invite Only</h3><p>When invite-only is set, users cannot join unless they are invited by an operator.</p><h4>Usage</h4><pre>/mode +i    — Enable invite only
/mode -i    — Disable invite only</pre><h4>See Also</h4><p><a href="#" data-help-topic="cmd-invite">/invite Command</a> · <a href="#" data-help-topic="feature-channel-invites">Channel Invites</a> · <a href="#" data-help-topic="feature-invite-exceptions">Invite Exceptions</a></p>
