<h3>/topic</h3><p>View or set the channel topic.</p><h4>Syntax</h4><pre>/topic [new topic text]</pre><p>Without arguments, shows the current topic. With text, sets a new topic.</p><p>If the channel has mode <strong>+t</strong>, only operators can change the topic.</p><h4>Examples</h4><pre>/topic
/topic Welcome to #elixir!</pre><h4>See Also</h4><p><a href="#" data-help-topic="mode-t">Topic Lock (+t)</a> · <a href="#" data-help-topic="ui-topic-bar">Topic Bar</a></p>
