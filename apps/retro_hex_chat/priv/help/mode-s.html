<h3>+s Secret</h3><p>Makes the channel secret. Secret channels do not appear in the channel list (/list) for non-members and are hidden from /whois output. Mutually exclusive with +p (private).</p><h4>Usage</h4><pre>/mode +s    — Make channel secret
/mode -s    — Remove secret mode</pre><h4>See Also</h4><p><a href="#" data-help-topic="mode-p">Private (+p)</a></p>
