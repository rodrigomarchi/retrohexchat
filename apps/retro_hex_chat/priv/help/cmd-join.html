<h3>/join</h3><p>Join a channel. Creates the channel if it does not exist.</p><h4>Syntax</h4><pre>/join &lt;#channel&gt; [key]</pre><h4>Parameters</h4><p><code>#channel</code> — Channel name (must start with #).<br/><code>key</code> — Optional channel key if the channel has mode +k set.</p><h4>Examples</h4><pre>/join #elixir
/join #secret mykey</pre><h4>See Also</h4><p><a href="#" data-help-topic="cmd-part">Part</a> · <a href="#" data-help-topic="cmd-invite">/invite</a> · <a href="#" data-help-topic="channels">Channels</a></p>
