<h3>/ns</h3><p>Send a command to NickServ (nickname registration service).</p><h4>Syntax</h4><pre>/ns &lt;command&gt; [arguments]</pre><h4>Examples</h4><pre>/ns register mypassword email@example.com
/ns identify mypassword
/ns info Alice
/ns ghost OldNick mypassword
/ns drop mypassword</pre><h4>See Also</h4><p><a href="#" data-help-topic="nickserv">NickServ Overview</a></p>
