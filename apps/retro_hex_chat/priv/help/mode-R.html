<h3>+R Registered Only</h3><p>When set, only users who have identified with NickServ can join the channel. Users already in the channel when +R is set are not affected.</p><h4>Usage</h4><pre>/mode +R    — Enable registered-only mode
/mode -R    — Disable registered-only mode</pre><h4>See Also</h4><p><a href="#" data-help-topic="feature-nickserv">NickServ</a></p>
