<h3>Topic Bar</h3><p>The topic bar appears below the tab bar and shows the current channel name, active modes, and topic text.</p><p>For PMs, it shows "Private conversation with &lt;nickname&gt;". For the Status tab, it shows "RetroHexChat Status".</p><h4>See Also</h4><p><a href="#" data-help-topic="cmd-topic">/topic Command</a></p>
