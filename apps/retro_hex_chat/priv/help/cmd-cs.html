<h3>/cs</h3><p>Send a command to ChanServ (channel registration service).</p><h4>Syntax</h4><pre>/cs &lt;command&gt; [arguments]</pre><h4>Examples</h4><pre>/cs register #mychannel
/cs access #mychannel add Alice op
/cs access #mychannel list
/cs drop #mychannel</pre><h4>See Also</h4><p><a href="#" data-help-topic="chanserv">ChanServ Overview</a></p>
