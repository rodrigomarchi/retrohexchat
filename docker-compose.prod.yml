services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST}
      - PORT=${PORT:-4000}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-4000}/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
