services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "49152-49651:49152-49651/udp"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST}
      - PORT=${PORT:-4000}
      - TURN_RELAY_PORT_MIN=49152
      - TURN_RELAY_PORT_MAX=49651
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-4000}/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
