<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hex gem facet gradients -->
    <linearGradient id="facet-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b3b3"/>
      <stop offset="100%" stop-color="#008080"/>
    </linearGradient>
    <linearGradient id="facet-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006666"/>
      <stop offset="100%" stop-color="#004d4d"/>
    </linearGradient>
    <linearGradient id="facet-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#009999"/>
      <stop offset="100%" stop-color="#007a7a"/>
    </linearGradient>
    <linearGradient id="facet-bottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#005c5c"/>
      <stop offset="100%" stop-color="#003d3d"/>
    </linearGradient>
    <!-- Shine/specular highlight -->
    <linearGradient id="shine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Win98-style inset shadow for the chat bubble -->
    <filter id="inset98" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="1" dy="1" in="SourceAlpha" result="off1"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.6" result="flood1"/>
      <feComposite in="flood1" in2="off1" operator="in" result="comp1"/>
      <feOffset dx="-1" dy="-1" in="SourceAlpha" result="off2"/>
      <feFlood flood-color="#000000" flood-opacity="0.4" result="flood2"/>
      <feComposite in="flood2" in2="off2" operator="in" result="comp2"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="comp1"/>
        <feMergeNode in="comp2"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for the gem -->
    <filter id="dropshadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- === HEX GEM BODY === -->
  <g filter="url(#dropshadow)">
    <!-- Outer hexagon (border/outline) -->
    <polygon
      points="256,52 424,149 424,343 256,440 88,343 88,149"
      fill="#003d3d"
      stroke="#002929"
      stroke-width="2"
    />

    <!-- Top facet (crown) -->
    <polygon
      points="256,52 424,149 256,196 88,149"
      fill="url(#facet-top)"
    />

    <!-- Left facet -->
    <polygon
      points="88,149 256,196 256,340 88,343"
      fill="url(#facet-left)"
    />

    <!-- Right facet -->
    <polygon
      points="424,149 256,196 256,340 424,343"
      fill="url(#facet-right)"
    />

    <!-- Bottom facet (pavilion) -->
    <polygon
      points="256,340 88,343 256,440 424,343"
      fill="url(#facet-bottom)"
    />

    <!-- Center diamond highlight -->
    <polygon
      points="256,196 340,246 256,340 172,246"
      fill="#008080"
      opacity="0.6"
    />

    <!-- Specular shine (top-left) -->
    <polygon
      points="256,52 424,149 256,196 88,149"
      fill="url(#shine)"
    />

    <!-- Edge highlights (gem cut lines) -->
    <line x1="256" y1="52" x2="256" y2="196" stroke="#00cccc" stroke-width="1" opacity="0.5"/>
    <line x1="88" y1="149" x2="256" y2="196" stroke="#00cccc" stroke-width="1" opacity="0.3"/>
    <line x1="424" y1="149" x2="256" y2="196" stroke="#00cccc" stroke-width="1" opacity="0.4"/>
    <line x1="256" y1="196" x2="256" y2="340" stroke="#00cccc" stroke-width="1" opacity="0.3"/>
    <line x1="256" y1="340" x2="88" y2="343" stroke="#00cccc" stroke-width="0.5" opacity="0.2"/>
    <line x1="256" y1="340" x2="424" y2="343" stroke="#00cccc" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- === CHAT BUBBLE ICON (inside gem) === -->
  <g transform="translate(256, 230)" filter="url(#inset98)">
    <!-- Speech bubble body -->
    <rect x="-52" y="-36" width="104" height="60" rx="4" ry="4"
      fill="#c0c0c0" stroke="#808080" stroke-width="2"/>
    <!-- Win98 3D border - top/left light -->
    <line x1="-50" y1="-34" x2="50" y2="-34" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="-50" y1="-34" x2="-50" y2="22" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Win98 3D border - bottom/right dark -->
    <line x1="-50" y1="22" x2="50" y2="22" stroke="#404040" stroke-width="1.5"/>
    <line x1="50" y1="-34" x2="50" y2="22" stroke="#404040" stroke-width="1.5"/>
    <!-- Bubble tail -->
    <polygon points="-20,24 -8,24 -28,44" fill="#c0c0c0" stroke="#808080" stroke-width="2"/>
    <line x1="-20" y1="24" x2="-8" y2="24" stroke="#c0c0c0" stroke-width="3"/>
    <!-- Text lines (mIRC-style) -->
    <line x1="-36" y1="-18" x2="36" y2="-18" stroke="#000080" stroke-width="3" stroke-linecap="round"/>
    <line x1="-36" y1="-4" x2="20" y2="-4" stroke="#008080" stroke-width="3" stroke-linecap="round"/>
    <line x1="-36" y1="10" x2="28" y2="10" stroke="#808080" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- === PIXEL SPARKLES (retro flair) === -->
  <!-- Top-right sparkle -->
  <rect x="380" y="100" width="4" height="4" fill="#ffffff" opacity="0.8"/>
  <rect x="376" y="104" width="4" height="4" fill="#ffffff" opacity="0.4"/>
  <rect x="384" y="104" width="4" height="4" fill="#ffffff" opacity="0.4"/>
  <rect x="380" y="108" width="4" height="4" fill="#ffffff" opacity="0.8"/>
  <!-- Small sparkle near top -->
  <rect x="310" y="80" width="3" height="3" fill="#ffffff" opacity="0.6"/>
  <rect x="307" y="83" width="3" height="3" fill="#ffffff" opacity="0.3"/>
  <rect x="313" y="83" width="3" height="3" fill="#ffffff" opacity="0.3"/>
  <rect x="310" y="86" width="3" height="3" fill="#ffffff" opacity="0.6"/>
</svg>
