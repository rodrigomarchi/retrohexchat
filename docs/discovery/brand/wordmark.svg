<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <linearGradient id="wm-ft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b3b3"/>
      <stop offset="100%" stop-color="#008080"/>
    </linearGradient>
    <linearGradient id="wm-fl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006666"/>
      <stop offset="100%" stop-color="#004d4d"/>
    </linearGradient>
    <linearGradient id="wm-fr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#009999"/>
      <stop offset="100%" stop-color="#007a7a"/>
    </linearGradient>
    <linearGradient id="wm-fb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#005c5c"/>
      <stop offset="100%" stop-color="#003d3d"/>
    </linearGradient>
  </defs>

  <!-- Mini hex gem -->
  <g transform="translate(60, 60) scale(0.85)">
    <polygon points="0,-48 42,-24 42,24 0,48 -42,24 -42,-24" fill="#003d3d"/>
    <polygon points="0,-48 42,-24 0,-12 -42,-24" fill="url(#wm-ft)"/>
    <polygon points="-42,-24 0,-12 0,24 -42,24" fill="url(#wm-fl)"/>
    <polygon points="42,-24 0,-12 0,24 42,24" fill="url(#wm-fr)"/>
    <polygon points="0,24 -42,24 0,48 42,24" fill="url(#wm-fb)"/>
    <!-- Mini chat bubble -->
    <rect x="-16" y="-12" width="32" height="20" rx="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
    <polygon points="-8,8 -4,8 -12,16" fill="#c0c0c0"/>
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#000080" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="1" x2="6" y2="1" stroke="#008080" stroke-width="2" stroke-linecap="round"/>
    <!-- Sparkle -->
    <rect x="30" y="-36" width="2" height="2" fill="#fff" opacity="0.8"/>
  </g>

  <!-- "RetroHexChat" wordmark -->
  <!-- Using system font fallback; intended font: MS Sans Serif / Pixelated -->
  <text x="130" y="78" font-family="'MS Sans Serif', 'Microsoft Sans Serif', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="52" font-weight="bold" fill="#000000" letter-spacing="-1">
    <tspan fill="#000000">Retro</tspan><tspan fill="#008080">Hex</tspan><tspan fill="#000080">Chat</tspan>
  </text>

  <!-- Tagline -->
  <text x="132" y="100" font-family="'MS Sans Serif', 'Microsoft Sans Serif', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="14" fill="#808080" letter-spacing="2">
    PUBLIC CHAT PLATFORM
  </text>
</svg>
